name: sanadi
description: Elder Care Application - Your Companion for a Happy & Fulfilling Life
publish_to: 'none'
version: 2.0.4+9

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  url_launcher: ^6.2.5
  geolocator: ^11.0.0
  battery_plus: ^5.0.2
  permission_handler: ^11.3.0
  
  # Google Maps
  google_maps_flutter: ^2.14.0
  geocoding: ^3.0.0
  http: ^1.2.0
  
  # State Management
  flutter_bloc: ^8.1.3
  
  # Localization
  easy_localization: ^3.0.3
  
  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_remote_config: ^5.0.0
  
  # Google & Facebook Sign In
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^6.0.4
  
  # Supabase
  supabase_flutter: ^2.0.0
  
  # Image Handling
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0
  path_provider: ^2.1.2
  
  # Utils
  shared_preferences: ^2.2.2
  equatable: ^2.0.5
  
  # UI
  flutter_screenutil: ^5.9.0
  smooth_page_indicator: ^1.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  share_plus: ^7.2.1
  camera: ^0.10.5+9
  flutter_local_notifications: ^17.2.4
  android_alarm_manager_plus: ^4.0.4
  timezone: ^0.9.4
  # Icons
  cupertino_icons: ^1.0.6
  fl_chart: ^0.69.0                                                                                   
  
  # لـ FFT Analysis
  
  
  # لـ ML (إن أردت)
  tflite_flutter: ^0.10.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/IconApp.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/IconApp.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/